<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earnr AI — Coming Soon</title>
  <meta name="description" content="Earnr AI is coming soon. Find your best way to make money with AI-powered personalized income plans." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Logo in top-left corner */
    .logo {
      position: fixed;
      top: 28px;
      left: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }
    .logo-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(34,197,94,.3);
    }
    .logo-text {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -.025em;
      color: #fff;
      opacity: .9;
    }

    /* Center content */
    .center {
      text-align: center;
      position: relative;
      z-index: 2;
    }
    .coming {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 900;
      letter-spacing: -.04em;
      line-height: 1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,.6) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp .8s ease both;
    }
    .sub {
      font-size: clamp(.9rem, 2vw, 1.15rem);
      font-weight: 400;
      color: rgba(255,255,255,.35);
      letter-spacing: .01em;
      animation: fadeUp .8s ease .2s both;
    }

    /* Subtle green glow behind text */
    .glow {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(34,197,94,.08) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: pulse 4s ease-in-out infinite;
    }

    /* Dot grid background */
    .dots {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: .6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    }
  </style>
</head>
<body>

  <div class="dots"></div>

  <div class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 18 18" fill="none">
        <text x="9" y="13.5" text-anchor="middle" font-family="Inter,sans-serif" font-weight="900" font-size="13" fill="white" fill-opacity=".92">$</text>
      </svg>
    </div>
    <span class="logo-text">Earnr AI</span>
  </div>

  <div class="center">
    <div class="glow"></div>
    <h1 class="coming">Coming Soon</h1>
    <p class="sub">Something smart is on the way.</p>
  </div>

</body>
</html>
