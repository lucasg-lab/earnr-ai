<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earnr AI — Coming Soon</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='32' y2='32'%3E%3Cstop stop-color='%2316a34a'/%3E%3Cstop offset='1' stop-color='%2322c55e'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='Arial,sans-serif' font-weight='900' font-size='22' fill='white'%3E$%3C/text%3E%3C/svg%3E" />
  <meta name="description" content="Earnr AI is coming soon. Find your best way to make money with AI-powered personalized income plans." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #000000;
      color: #ffffff;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Logo top-left ── */
    .logo {
      position: absolute;
      top: 28px;
      left: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(34,197,94,.25);
    }
    .logo-text {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -.025em;
      opacity: .9;
    }

    /* ── Centered text ── */
    h1 {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 900;
      letter-spacing: -.04em;
      line-height: 1;
      margin-bottom: 16px;
      color: #ffffff;
      text-align: center;
      animation: fadeUp .8s ease forwards;
      opacity: 0;
    }
    p {
      font-size: clamp(.9rem, 2vw, 1.15rem);
      font-weight: 400;
      color: rgba(255,255,255,.35);
      text-align: center;
      animation: fadeUp .8s ease .2s forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 18 18" fill="none">
        <text x="9" y="13.5" text-anchor="middle" font-family="Inter,sans-serif" font-weight="900" font-size="13" fill="white" fill-opacity=".92">$</text>
      </svg>
    </div>
    <span class="logo-text">Earnr AI</span>
  </div>

  <h1>Coming Soon</h1>
  <p>Something smart is on the way.</p>

</body>
</html>
